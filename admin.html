<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grow X SSEL · 학교 관리자</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/admin.css">
</head>
<body class="admin-body">

<!-- ── Header ── -->
<header class="adm-header">
  <div class="adm-logo">
    <span>Grow <span class="brand-x">X</span></span>
    <span class="brand-suf">SSEL</span>
  </div>

  <div class="adm-school-badge">
    <span class="dot"></span>
    <span id="adm-school-name">—</span>
  </div>

  <button class="adm-logout" id="adm-logout">로그아웃</button>
</header>

<!-- ── Main ── -->
<main class="adm-main">

  <!-- Page header -->
  <div class="adm-page-head">
    <div>
      <div class="adm-eyebrow">학교 관리자 대시보드</div>
      <h1 class="adm-page-title">전체 학교 현황</h1>
    </div>
    <span class="adm-date" id="adm-date">—</span>
  </div>

  <!-- Stats -->
  <div class="adm-stats">
    <div class="adm-stat">
      <div class="adm-stat-label">총 학급</div>
      <div class="adm-stat-value" id="stat-classes">—</div>
      <div class="adm-stat-sub">등록된 학급</div>
    </div>
    <div class="adm-stat">
      <div class="adm-stat-label">총 학생</div>
      <div class="adm-stat-value" id="stat-students">—</div>
      <div class="adm-stat-sub">전체 등록 학생</div>
    </div>
    <div class="adm-stat adm-stat--accent">
      <div class="adm-stat-label">오늘 체크인</div>
      <div class="adm-stat-value" id="stat-checkin">—</div>
      <div class="adm-stat-sub">평균 완료율</div>
    </div>
    <div class="adm-stat adm-stat--warn">
      <div class="adm-stat-label">주의 학생</div>
      <div class="adm-stat-value" id="stat-alerts">—</div>
      <div class="adm-stat-sub">확인 필요</div>
    </div>
  </div>

  <!-- Classrooms -->
  <div>
    <div class="adm-section-head">
      <h2 class="adm-section-title">학급별 현황</h2>
    </div>
    <div class="adm-class-grid" id="adm-class-grid"></div>
  </div>

  <!-- Alerts -->
  <div>
    <div class="adm-section-head">
      <h2 class="adm-section-title">주의 학생 목록</h2>
    </div>
    <div class="adm-alerts" id="adm-alert-list"></div>
  </div>

  <!-- Registration requests -->
  <div id="adm-reg-section">
    <div class="adm-section-head">
      <h2 class="adm-section-title">📋 신규 학교 신청 <span id="adm-reg-count" style="font-size:12px;font-weight:500;color:var(--fg-mute);margin-left:8px"></span></h2>
    </div>
    <div id="adm-reg-list"></div>
  </div>

</main>

<script src="scripts/auth.js"></script>
<script src="scripts/admin.js"></script>
</body>
</html>
