<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grow X SSEL · 운영팀 관리자</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/admin.css">
</head>
<body class="admin-body">

<header class="adm-header">
  <div class="adm-logo">
    <span>Grow <span class="brand-x">X</span></span>
    <span class="brand-suf">SSEL · OPS</span>
  </div>

  <div class="adm-school-badge">
    <span class="dot"></span>
    <span id="adm-school-name">Grow X 운영팀</span>
  </div>

  <button class="adm-logout" id="adm-logout">로그아웃</button>
</header>

<main class="adm-main">

  <div class="adm-page-head">
    <div>
      <div class="adm-eyebrow">운영팀 대시보드</div>
      <h1 class="adm-page-title">학교 신청 관리</h1>
    </div>
    <span class="adm-date" id="adm-date">—</span>
  </div>

  <div class="adm-stats">
    <div class="adm-stat adm-stat--warn">
      <div class="adm-stat-label">검토 대기</div>
      <div class="adm-stat-value" id="stat-pending">—</div>
      <div class="adm-stat-sub">승인 필요</div>
    </div>
    <div class="adm-stat adm-stat--accent">
      <div class="adm-stat-label">승인 학교</div>
      <div class="adm-stat-value" id="stat-approved">—</div>
      <div class="adm-stat-sub">활성 계정</div>
    </div>
    <div class="adm-stat">
      <div class="adm-stat-label">거절</div>
      <div class="adm-stat-value" id="stat-rejected">—</div>
      <div class="adm-stat-sub">반려된 신청</div>
    </div>
    <div class="adm-stat">
      <div class="adm-stat-label">총 신청</div>
      <div class="adm-stat-value" id="stat-total">—</div>
      <div class="adm-stat-sub">누적 신청 건수</div>
    </div>
  </div>

  <div id="adm-reg-section">
    <div class="adm-section-head">
      <h2 class="adm-section-title">📋 신규 학교 신청 <span id="adm-reg-count" style="font-size:12px;font-weight:500;color:var(--fg-mute);margin-left:8px"></span></h2>
    </div>
    <div id="adm-reg-list"></div>
  </div>

  <div id="adm-approved-section">
    <div class="adm-section-head">
      <h2 class="adm-section-title">✅ 승인된 학교</h2>
    </div>
    <div id="adm-approved-list"></div>
  </div>

</main>

<script src="scripts/auth.js"></script>
<script src="scripts/admin.js"></script>
</body>
</html>
