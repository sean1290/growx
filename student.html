<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grow X SSEL · 학생 체크인</title>
<meta name="description" content="Grow X SSEL 학생 체크인 — 등교·하교 감정 체크인">

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/app.css">
</head>
<body class="app-body">

<!-- ─── TOP HEADER ─── -->
<header class="app-header" id="app-header">
  <a class="header-brand" href="student.html" aria-label="홈으로">
    <span class="brand-mark">Grow <span class="brand-x">X</span></span>
    <span class="brand-suf">SSEL</span>
  </a>

  <div class="header-meta">
    <span class="hm-date" id="top-date">—</span>
    <span class="hm-pulse" aria-hidden="true"></span>
  </div>

  <div class="header-actions">
    <div class="student-class-badge" id="student-class-badge"></div>
    <button class="header-teacher" id="open-teacher" aria-label="교사 대시보드">
      <span class="ht-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"/>
          <path d="M7 11V8a5 5 0 0 1 10 0v3"/>
        </svg>
      </span>
      <span class="ht-label">교사</span>
    </button>
  </div>

  <!-- Generic modal mount point (for the lock PIN prompt) -->
  <div id="t-modal-mount"></div>
</header>

<!-- ─── MAIN ─── -->
<main class="app-main" id="app-main">
  <section class="view" data-view="home"      id="view-home"></section>
  <section class="view" data-view="arrival"   id="view-arrival"></section>
  <section class="view" data-view="departure" id="view-departure"></section>
  <section class="view" data-view="teacher"   id="view-teacher"></section>

  <div class="app-toast" id="app-toast" role="status" aria-live="polite"></div>
</main>

<!-- auth.js first (defines GX), then inline session setup, then app.js -->
<script src="scripts/auth.js"></script>
<script>
(function () {
  var params  = new URLSearchParams(location.search);
  var classId = params.get('class');
  if (!classId) {
    document.body.innerHTML =
      '<div style="padding:60px 24px;text-align:center;font-family:Pretendard,sans-serif;color:#475569">'
      + '<div style="font-size:48px;margin-bottom:14px">🔗</div>'
      + '<div style="font-size:18px;font-weight:600;color:#0F172A;margin-bottom:8px">학급 링크가 필요합니다</div>'
      + '<div style="font-size:13px">담임 선생님께 학급 전용 URL을 받아주세요.</div>'
      + '</div>';
    return;
  }
  // If a teacher session is already on this device, back it up so the 교사
  // button + PIN can restore it later without forcing a fresh login.
  var existing = window.GX.getSession();
  if (existing && (existing.role === 'teacher' || existing.role === 'admin_view')) {
    localStorage.setItem('growx_teacher_backup', JSON.stringify(existing));
  }
  window.GX.setSession({ role: 'student', classId: classId });
})();
</script>
<script src="scripts/app.js" defer></script>
</body>
</html>
